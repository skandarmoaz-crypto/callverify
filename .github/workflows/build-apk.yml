name: Build CallVerify APK

  on:
    push:
      branches: [main]
      paths:
        - 'android-app/**'
        - '.github/workflows/build-apk.yml'
    workflow_dispatch:   # Allow manual trigger from GitHub UI

  jobs:
    build-apk:
      name: Build & Release APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

        - name: Make gradlew executable
          working-directory: android-app
          run: chmod +x gradlew

        - name: Download Gradle Wrapper JAR
          working-directory: android-app
          run: |
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar

        - name: Cache Gradle Packages
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/gradle/wrapper/gradle-wrapper.properties') }}
            restore-keys: gradle-

        - name: Build Debug APK
          working-directory: android-app
          run: ./gradlew assembleDebug --no-daemon --stacktrace

        - name: Build Release APK
          working-directory: android-app
          run: ./gradlew assembleRelease --no-daemon --stacktrace

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: callverify-debug
            path: android-app/app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: Upload Release APK
          uses: actions/upload-artifact@v4
          with:
            name: callverify-release
            path: android-app/app/build/outputs/apk/release/app-release.apk
            retention-days: 30

        - name: Create GitHub Release
          if: github.ref == 'refs/heads/main'
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v${{ github.run_number }}
            name: "CallVerify APK — Build ${{ github.run_number }}"
            body: |
              ## 📱 CallVerify Android App

              ### تثبيت التطبيق:
              1. حمّل `callverify-release.apk`
              2. فعّل "تثبيت من مصادر غير معروفة" في إعدادات الهاتف
              3. ثبّت الـ APK
              4. افتح التطبيق وأدخل:
                 - رابط الـ API
                 - `APP_SECRET_KEY`
              5. اضغط "تشغيل المراقبة"

              ### الأذونات المطلوبة:
              - `READ_PHONE_STATE` — رصد المكالمات
              - `READ_CALL_LOG` — قراءة سجل المكالمات
              - `INTERNET` — إرسال البيانات للـ API
              - `FOREGROUND_SERVICE` — العمل في الخلفية

            files: |
              android-app/app/build/outputs/apk/debug/app-debug.apk
              android-app/app/build/outputs/apk/release/app-release.apk
            draft: false
            prerelease: false
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  